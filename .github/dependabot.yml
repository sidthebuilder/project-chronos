version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/chronos-rust"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "rust"
    groups:
      all-minor-patch:
        update-types: ["minor", "patch"]
        applies-to: version-updates
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "python"
    groups:
      all-minor-patch:
        update-types: ["minor", "patch"]
        applies-to: version-updates
