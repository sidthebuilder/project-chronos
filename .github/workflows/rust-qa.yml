name: Rust Prototype QA

on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./chronos-rust
    steps:
    - uses: actions/checkout@v4
    
    - name: Check code formatting
      run: cargo fmt --all -- --check
      
    - name: Run strict Clippy checks with Reviewdog
      uses: giraffate/clippy-action@v1
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        clippy_flags: --manifest-path ./chronos-rust/Cargo.toml --all-targets --all-features -- -D warnings
        reporter: github-pr-review
        fail_on_error: true
    
    - name: Install cargo-audit
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-audit
        
    - name: Run Cargo Audit (Security Vulnerability Check)
      continue-on-error: true
      run: cargo audit --ignore RUSTSEC-2025-0055 --ignore RUSTSEC-2025-0141 --ignore RUSTSEC-2024-0388 --ignore RUSTSEC-2024-0384
    
    - name: Install dependencies (CUDA)
      run: |
        sudo apt-get update && sudo apt-get install -y nvidia-cuda-toolkit gcc-12 g++-12
        sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-12 100
        sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-12 100
        sudo update-alternatives --install /usr/bin/cc cc /usr/bin/gcc-12 100
        sudo update-alternatives --install /usr/bin/c++ c++ /usr/bin/g++-12 100

    - name: Install cargo-tarpaulin
      uses: taiki-e/install-action@cargo-tarpaulin

    - name: Run tests with coverage
      env:
        CC: gcc-12
        CXX: g++-12
      run: cargo tarpaulin --engine llvm --all-features --workspace --exclude chronos-ebpf --exclude chronos-dashboard --timeout 120 --out xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false
        files: ./chronos-rust/cobertura.xml

    - name: Check WASM Dashboard
      run: |
        rustup target add wasm32-unknown-unknown
        cargo check --target wasm32-unknown-unknown -p chronos-dashboard

  miri:
    name: Miri Memory Analyzer
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./chronos-rust
    steps:
      - uses: actions/checkout@v4
      - name: Install Nightly Rust and Miri
        run: |
          rustup toolchain install nightly
          rustup +nightly component add miri rust-src
      - name: Run Miri on chronos-core
        run: cargo +nightly miri test --package chronos-core

  rust_prototype_qa:
    name: Rust Prototype QA
    needs: [test, miri]
    runs-on: ubuntu-latest
    steps:
      - run: echo "Rust tests and Miri analysis passed successfully!"
