name: Rust Prototype QA

on:
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./chronos-rust
    steps:
    - uses: actions/checkout@v4
    
    - name: Check code formatting
      run: cargo fmt --all -- --check
      
    - name: Run strict Clippy checks with Reviewdog
      uses: giraffate/clippy-action@v1
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        clippy_flags: --manifest-path ./chronos-rust/Cargo.toml --all-targets --all-features -- -D warnings
        reporter: github-pr-review
        fail_on_error: true
    
    - name: Install cargo-audit
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-audit
        
    - name: Run Cargo Audit (Security Vulnerability Check)
      run: cargo audit --ignore RUSTSEC-2025-0055 --ignore RUSTSEC-2025-0055
    
    - name: Install dependencies (CUDA)
      run: sudo apt-get update && sudo apt-get install -y nvidia-cuda-toolkit

    - name: Install cargo-tarpaulin
      uses: taiki-e/install-action@cargo-tarpaulin

    - name: Run tests with coverage
      run: cargo tarpaulin --engine llvm --all-features --workspace --timeout 120 --out xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: true
        files: ./chronos-rust/cobertura.xml

    - name: Check WASM Dashboard
      run: |
        rustup target add wasm32-unknown-unknown
        cargo check --target wasm32-unknown-unknown -p chronos-dashboard

  rust_prototype_qa:
    name: Rust Prototype QA
    needs: test
    runs-on: ubuntu-latest
    steps:
      - run: echo "Rust tests passed successfully!"
