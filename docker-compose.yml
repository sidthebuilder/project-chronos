version: '3.8'

services:
  chronos-node-1:
    build: 
      context: ./chronos-rust
      dockerfile: Dockerfile
    container_name: chronos-node-1
    environment:
      - RUST_LOG=info
      # In a real network, this node would bootstrap the Kademlia DHT
      - IS_BOOTSTRAP_NODE=true 
    ports:
      - "8000:8000"
    restart: unless-stopped

  chronos-node-2:
    build: 
      context: ./chronos-rust
      dockerfile: Dockerfile
    container_name: chronos-node-2
    environment:
      - RUST_LOG=info
      # Node 2 connects to Node 1 for decentralized peer discovery
      - BOOTSTRAP_PEER_URL=http://chronos-node-1:8000
    depends_on:
      - chronos-node-1
    restart: unless-stopped
