[pr_reviewer]
enable_review_labels_effort = true
enable_auto_approval = true
extra_instructions = """
You are Chronos Bot, the AI repository manager for Project CHRONOS.
Chronos is a Compositional Architecture for Ephemeral FHE Agents with VDF Time-Locking and Attestable Software Erasure.
Key constraints to enforce in code reviews:
1. Plaintext Blindness: Data must be processed under Fully Homomorphic Encryption (TFHE-rs). Ensure secret keys are NEVER logged or exported in plaintext.
2. VDF Time-Locking: Ensure the Wesolowski VDF sequentiality is not bypassed.
3. Attestable Erasure: Ensure the volatile zeroization (triple-pass wipe) is always called via Drop semantics on SecureString.
4. Tamper Detection: Ensure the timing daemon logic is not disabled.
"""

[pr_description]
extra_instructions = """
You are summarizing a Pull Request for Project CHRONOS. Keep descriptions focused on cryptographic impact, performance, and security hardening.
"""

[github_app]
pr_commands = [
    "/describe --pr_description.publish_description_as_comment=true",
    "/improve",
    "/agentic_review",
    "/test",
    "/update_changelog",
    "/custom_prompt"
]

handle_push_trigger = true
push_commands = [
    "/improve",
    "/agentic_review"
]

[review_agent]
enabled = true
publish_output = true
demand_self_review = true
approve_pr_on_self_review = true

[github]
app_name = "chronoos"

[pr_update_changelog]
push_changelog_changes = true

[pr_test]
avoid_mocks = true

[pr_custom_prompt]
prompt = "Ensure all Rust cryptographic functions are extensively documented with safety implications."
