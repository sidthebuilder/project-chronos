name: Rust Prototype QA

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./chronos-rust
    steps:
    - uses: actions/checkout@v4
    
    - name: Check code formatting
      run: cargo fmt --all -- --check
      
    - name: Run strict Clippy checks with Reviewdog
      uses: giraffate/clippy-action@v1
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        clippy_flags: --manifest-path ./chronos-rust/Cargo.toml --all-targets --all-features -- -D warnings
        reporter: github-pr-review
        fail_on_error: true
    
    - name: Run Cargo Audit (Security Vulnerability Check)
      uses: rustsec/audit-check@v1.4.1
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        working-directory: ./chronos-rust
    
    - name: Run tests
      run: cargo test --verbose
