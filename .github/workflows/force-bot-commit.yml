name: Force Bot Commit
on:
  push:
    branches:
      - main

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CHRONOS_APP_ID }}
          private-key: ${{ secrets.CHRONOS_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          
      - name: Commit as Bot
        run: |
          git config user.name "chronoos-bot[bot]"
          git config user.email "4332138+chronoos-bot[bot]@users.noreply.github.com"
          git checkout -b bot-signature-branch
          echo " " >> README.md
          git add README.md
          git commit -m "docs: official bot signature commit"
          git push origin bot-signature-branch -f
