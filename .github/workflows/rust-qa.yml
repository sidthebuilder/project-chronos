name: Rust Prototype QA

on:
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./chronos-rust
    steps:
    - uses: actions/checkout@v4
    
    - name: Check code formatting
      run: cargo fmt --all -- --check
      
    - name: Run strict Clippy checks with Reviewdog
      uses: giraffate/clippy-action@v1
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        clippy_flags: --manifest-path ./chronos-rust/Cargo.toml --all-targets --all-features -- -D warnings
        reporter: github-pr-review
        fail_on_error: true
    
    - name: Install cargo-audit
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-audit
        
    - name: Run Cargo Audit (Security Vulnerability Check)
      # Ignoring vulnerabilities from curv-kzen dependencies (prototype phase)
      # RUSTSEC-2025-0124 (rand_os unmaintained)
      # RUSTSEC-2025-0134 (rustls-pemfile unmaintained)
      # RUSTSEC-2026-0097 (rand 0.7 unsoundness)
      # RUSTSEC-2022-0070 (secp256k1 unsoundness)
      # RUSTSEC-2024-0344 (curve25519-dalek timing variability)
      run: cargo audit --ignore RUSTSEC-2025-0124 --ignore RUSTSEC-2025-0134 --ignore RUSTSEC-2026-0097 --ignore RUSTSEC-2022-0070 --ignore RUSTSEC-2024-0344
    
    - name: Run tests
      run: cargo test --verbose
