name: Rust Prototype QA

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./chronos-rust
    steps:
    - uses: actions/checkout@v7
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
