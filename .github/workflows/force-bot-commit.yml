name: Force Bot Commit
on:
  push:
    branches:
      - main

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CHRONOS_APP_ID }}
          private-key: ${{ secrets.CHRONOS_APP_PRIVATE_KEY }}
          
      - name: Commit as Bot
        run: |
          git remote set-url origin https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/${{ github.repository }}
          git config user.name "chronoos-bot[bot]"
          git config user.email "4332138+chronoos-bot[bot]@users.noreply.github.com"
          echo " " >> README.md
          git add README.md
          git commit -m "docs: official bot signature commit"
          git push
