name: Chronos Benchmark Bot

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  benchmark:
    name: Run FHE Performance Benchmarks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Cryptographic Benchmarks
        run: |
          echo "Running Paillier FHE and SHA-256 Benchmarks..."
          python benchmark.py --runs 5

      - name: Post Results to PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            
            // Read the generated markdown results
            const results = fs.readFileSync('real_results.md', 'utf8');
            
            const commentBody = `🤖 **Chronos Benchmark Bot** has analyzed this Pull Request!\n\n<details><summary>Click to view FHE Performance Metrics</summary>\n\n${results}\n\n</details>`;
            
            // Fetch existing comments to see if we already commented
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(c => c.user.type === 'Bot' && c.body.includes('Chronos Benchmark Bot'));
            
            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: commentBody
              });
            }
