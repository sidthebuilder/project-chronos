name: CHRONOS CI

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    runs-on: ${{ matrix.os }}

    env:
      CHRONOS_DISABLE_ANTI_TAMPER: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: flake8
        run: flake8 --max-line-length=100 --exclude=chronos-bot --extend-ignore=E203,W503,E501,E402,F841,F401,F541,E704 .

      - name: pytest
        run: pytest tests/ -q --tb=short

  chronos_ci:
    name: CHRONOS CI
    needs: test
    runs-on: ubuntu-latest
    steps:
      - run: echo "All matrix tests passed successfully!"
